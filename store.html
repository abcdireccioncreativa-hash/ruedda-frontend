<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Ruedda Store</title>
<meta name="description" content="Ruedda Store. Apparel, accesorios, mugs y linea STXX.">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ruedda Store">
<meta name="format-detection" content="telephone=no"><style>
/* Open Sauce One 400/500/700 — apuntar al bucket assets del proyecto Ruedda */
@font-face{font-family:'Open Sauce One';src:local('Open Sauce One'),url('https://ltodsegzbbdcaublkgtp.supabase.co/storage/v1/object/public/assets/fonts/OpenSauceOne-Regular.woff2') format('woff2');font-weight:400;font-style:normal;font-display:swap}
@font-face{font-family:'Open Sauce One';src:local('Open Sauce One Medium'),url('https://ltodsegzbbdcaublkgtp.supabase.co/storage/v1/object/public/assets/fonts/OpenSauceOne-Medium.woff2') format('woff2');font-weight:500;font-style:normal;font-display:swap}
@font-face{font-family:'Open Sauce One';src:local('Open Sauce One Bold'),url('https://ltodsegzbbdcaublkgtp.supabase.co/storage/v1/object/public/assets/fonts/OpenSauceOne-Bold.woff2') format('woff2');font-weight:700;font-style:normal;font-display:swap}

:root{
  --neg:#000;--bla:#fff;--gris:#f3f3f3;--gris-med:#8a8a8a;--gris-osc:#4a4a4a;
  --hud-bg:#0a0a0a;--hud-card:#141414;--hud-borde:#262626;
  --ok:#3ecf6a;--warn:#f2c14e;--err:#e5484d;--info:#8ab4f8;
  --ease:cubic-bezier(0.16,1,0.3,1);
}
*{margin:0;padding:0;box-sizing:border-box}
html{-webkit-text-size-adjust:100%}
body{font-family:'Open Sauce One',-apple-system,'Segoe UI',Helvetica,Arial,sans-serif;background:var(--bla);color:var(--neg);font-weight:400;overflow-x:hidden}
img{display:block;max-width:100%}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,textarea,select{font-family:inherit;font-size:16px}
a{color:inherit}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}
:focus-visible{outline:2px solid var(--neg);outline-offset:2px}
.hud :focus-visible,#splash :focus-visible{outline-color:var(--bla)}

/* ============ SPLASH ============ */
#splash{position:fixed;inset:0;background:#000;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:transform .6s var(--ease)}
#splash.salir{transform:translateY(-100%)}
.splash-logo{display:flex;flex-direction:column;align-items:center;opacity:0;transform:translateY(8px);animation:splashIn .4s var(--ease) forwards}
@keyframes splashIn{to{opacity:1;transform:translateY(0)}}
.logo-img{display:block;width:auto}
.logo-store{color:#fff;font-weight:400;font-size:13px;letter-spacing:.5em;margin-top:10px;padding-left:.5em}
.splash-bar{width:160px;height:2px;background:#222;margin-top:34px;overflow:hidden;border-radius:1px}
.splash-bar i{display:block;height:100%;width:0;background:#fff}

/* ============ VISTAS / TRANSICIONES ============ */
#app{min-height:100vh}
.vista{animation:vistaIn .22s var(--ease)}
@keyframes vistaIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.vista.saliendo{animation:vistaOut .12s ease forwards}
@keyframes vistaOut{to{opacity:0}}
@media (prefers-reduced-motion:reduce){
  .vista{animation:fadeOnly .2s ease}
  .vista.saliendo{animation:fadeOut .1s ease forwards}
  #splash{transition:opacity .3s ease}
  #splash.salir{transform:none;opacity:0;pointer-events:none}
  @keyframes fadeOnly{from{opacity:0}to{opacity:1}}
  @keyframes fadeOut{to{opacity:0}}
}

/* ============ HEADER / HERO ============ */
.hero{position:relative;height:60vh;min-height:420px;background:#111;overflow:hidden}
.hero img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s ease}
.hero img.lista{opacity:1}
.header-store{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:flex-start;justify-content:space-between;padding:22px 24px;padding-top:max(22px, calc(env(safe-area-inset-top) + 14px))}
.btn-categorias{color:#fff;font-weight:700;font-size:18px;line-height:1;display:flex;align-items:center;gap:8px}
.btn-categorias .chev{font-size:13px;font-weight:400;transform:translateY(3px);transition:transform .2s ease}
.btn-categorias[aria-expanded="true"] .chev{transform:translateY(3px) rotate(180deg)}
.btn-carrito{position:relative;padding:4px;color:#fff}
.btn-carrito svg{width:34px;height:34px}
.badge-carrito{position:absolute;top:-2px;right:-4px;background:#fff;color:#000;font-weight:700;font-size:11px;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.hero-marca{position:absolute;left:0;right:0;bottom:44px;display:flex;flex-direction:column;align-items:center;z-index:5}

.hero-marca .logo-store{font-size:14px}

/* dropdown frosted glass */
.dropdown-cat{position:absolute;top:58px;left:24px;z-index:30;min-width:250px;border-radius:24px;background:rgba(255,255,255,.55);-webkit-backdrop-filter:blur(24px) saturate(180%);backdrop-filter:blur(24px) saturate(180%);border:1px solid rgba(255,255,255,.4);box-shadow:0 18px 50px rgba(0,0,0,.28);padding:18px 8px;opacity:0;transform:translateY(-8px);pointer-events:none;transition:opacity .22s var(--ease),transform .22s var(--ease)}
@supports not ((backdrop-filter:blur(1px)) or (-webkit-backdrop-filter:blur(1px))){.dropdown-cat{background:rgba(255,255,255,.92)}}
.dropdown-cat.abierto{opacity:1;transform:translateY(0);pointer-events:auto}
.dropdown-cat button{display:block;width:100%;text-align:left;color:#000;font-weight:700;font-size:17px;padding:10px 22px;border-radius:14px}
.dropdown-cat button:active{background:rgba(0,0,0,.06)}

/* ============ GRID PRODUCTOS ============ */
.grid-wrap{padding:28px 24px 56px;max-width:1100px;margin:0 auto}
.grid-productos{display:grid;grid-template-columns:repeat(2,1fr);gap:16px}
@media(min-width:900px){.grid-productos{grid-template-columns:repeat(4,1fr)}}
.card-prod{text-align:left;display:block;width:100%}
.card-img{position:relative;aspect-ratio:1/1;background:var(--gris);overflow:hidden}
.card-img img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s ease}
.card-img img.lista{opacity:1}
.badge-ref{position:absolute;right:0;bottom:0;background:#000;color:#fff;font-weight:700;font-size:14px;padding:6px 12px}
.overlay-agotado{position:absolute;inset:0;background:rgba(255,255,255,.72);display:flex;align-items:center;justify-content:center;color:#000;font-weight:700;font-size:16px;letter-spacing:.08em}
.card-nombre{font-weight:700;font-size:17px;margin-top:10px}
.grid-vacio{padding:60px 0;text-align:center;color:var(--gris-med)}
.skel{aspect-ratio:1/1;background:var(--gris);animation:skel 1.2s ease infinite alternate}
@keyframes skel{to{opacity:.5}}

/* ============ DETALLE PRODUCTO ============ */
.detalle{max-width:1100px;margin:0 auto;padding-bottom:64px}
.detalle-top{display:flex;justify-content:space-between;align-items:center;padding:18px 24px;padding-top:max(18px, calc(env(safe-area-inset-top) + 12px))}
.btn-volver{font-weight:700;font-size:16px}
.galeria{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.galeria::-webkit-scrollbar{display:none}
.galeria .slide{flex:0 0 100%;scroll-snap-align:start;aspect-ratio:1/1;background:var(--gris)}
.galeria .slide img{width:100%;height:100%;object-fit:cover}
@media(min-width:900px){.detalle-body{display:grid;grid-template-columns:1fr 1fr;gap:40px;padding:0 24px}.galeria-col{min-width:0}.galeria .slide{aspect-ratio:4/3}}
.detalle-info{padding:24px}
@media(min-width:900px){.detalle-info{padding:24px 0}}
.detalle-info h1{font-weight:700;font-size:30px}
.detalle-precio{font-weight:700;font-size:24px;margin-top:8px}
.detalle-desc{color:var(--gris-osc);font-size:15px;line-height:1.55;margin-top:14px;white-space:pre-line}
.sel-grupo{margin-top:22px}
.sel-grupo .lbl{font-weight:700;font-size:14px;margin-bottom:10px;display:block}
.chips{display:flex;flex-wrap:wrap;gap:10px}
.chip{border:1.5px solid #000;padding:10px 16px;font-weight:500;font-size:14px;background:#fff;min-width:48px;text-align:center}
.chip[aria-pressed="true"]{background:#000;color:#fff}
.chip[disabled]{opacity:.3;cursor:not-allowed;text-decoration:line-through}
.chip .sw{display:inline-block;width:12px;height:12px;border-radius:50%;margin-right:6px;vertical-align:-1px;border:1px solid rgba(0,0,0,.2)}
.qty-row{display:flex;align-items:center;gap:0;margin-top:22px;border:1.5px solid #000;width:max-content}
.qty-row button{width:48px;height:48px;font-size:20px;font-weight:700}
.qty-row span{width:52px;text-align:center;font-weight:700;font-size:17px}
.btn-negro{display:block;width:100%;background:#000;color:#fff;font-weight:700;font-size:17px;height:56px;margin-top:26px}
.btn-negro[disabled]{opacity:.45;cursor:not-allowed}
.stock-nota{font-size:13px;color:var(--gris-med);margin-top:10px}

/* ============ CHECKOUT ============ */
.checkout{max-width:1100px;margin:0 auto;padding:56px 24px 0;padding-top:max(56px, calc(env(safe-area-inset-top) + 34px))}
.checkout h1{font-weight:700;font-size:40px}
.co-sub{font-weight:700;font-size:26px;margin-top:36px}
.co-items{margin-top:14px}
.co-item{padding:6px 0}
.co-linea{display:flex;align-items:baseline;gap:12px}
.co-linea .nom{font-weight:700;font-size:22px}
.co-vermas{font-weight:400;color:var(--gris-osc);font-size:15px}
.co-exp{display:none;padding:10px 0 6px;font-size:14px;color:var(--gris-osc);line-height:1.7}
.co-exp.abierto{display:block}
.co-exp .quitar{border:1px solid #000;color:#000;font-size:12px;font-weight:500;padding:4px 12px;margin-top:6px}
.co-total-fila{display:flex;flex-wrap:wrap;align-items:flex-end;justify-content:space-between;gap:20px;margin-top:44px}
.co-total .t1{font-weight:700;font-size:40px;line-height:1.1}
.co-total .t2{font-weight:700;font-size:40px;line-height:1.1}
.co-total .tachado{text-decoration:line-through;color:var(--gris-med);font-size:24px;font-weight:700;margin-right:10px}
.co-desc-ok{font-size:13px;color:var(--gris-osc);margin-top:6px}
.co-desc-err{font-size:13px;color:var(--err);margin-top:6px}
.inp-codigo-wrap{flex:1;min-width:230px;max-width:420px}
.inp-negro{width:100%;background:#111;color:#fff;border:none;height:58px;text-align:center;font-size:16px}
.inp-negro::placeholder{color:#9a9a9a}
.co-legal{font-size:13px;color:var(--gris-osc);line-height:1.6;margin-top:34px;max-width:620px}
.co-pagar{margin-top:30px}
.co-editorial{margin-top:42px;margin-left:-24px;margin-right:-24px}
@media(min-width:1100px){.co-editorial{margin-left:0;margin-right:0}}
.co-editorial img{width:100%;height:auto}
.co-vacio{text-align:center;padding:110px 24px}
.co-vacio p{font-weight:700;font-size:22px}
.co-vacio a{display:inline-block;margin-top:16px;text-decoration:underline;font-weight:500}

/* ============ DATOS DE ENVIO ============ */
.envio{max-width:1100px;margin:0 auto;padding:56px 24px 72px;padding-top:max(56px, calc(env(safe-area-inset-top) + 34px))}
.envio h1{font-weight:700;font-size:44px;line-height:1.05}
.envio-sub{font-size:14px;color:var(--gris-osc);margin-top:10px;max-width:520px;line-height:1.6}
.f-fila{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-top:26px}
.f-uno{margin-top:16px}
.inp-env{width:100%;background:#000;color:#fff;border:none;height:64px;text-align:center;font-size:17px}
.inp-env::placeholder{color:#b5b5b5}
.inp-comp{display:flex;background:#000;height:64px;margin-top:16px}
.inp-comp .pref{color:#dcdcdc;font-size:17px;display:flex;align-items:center;padding:0 0 0 26px;flex:0 0 auto}
.inp-comp select.pref{background:#000;border:none;color:#dcdcdc;padding:0 6px 0 26px;-webkit-appearance:none;appearance:none;font-size:17px}
.inp-comp input{flex:1;background:transparent;border:none;color:#fff;text-align:center;font-size:17px}
.inp-comp input::placeholder{color:#b5b5b5}
.txt-agencia{width:100%;background:#000;color:#fff;border:none;height:380px;margin-top:16px;text-align:center;padding:170px 24px 0;font-size:17px;resize:none}
.txt-agencia::placeholder{color:#b5b5b5}
.nota-agencias{font-weight:700;font-size:14px;margin-top:14px}
.bloque-pago{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;margin-top:44px;flex-wrap:wrap}
.binance-info .b1{font-weight:700;font-size:28px}
.binance-info .b2{font-weight:700;font-size:28px;display:flex;align-items:center;gap:10px;word-break:break-all}
.btn-copiar{border:1px solid #000;font-size:12px;font-weight:500;padding:4px 12px;flex:0 0 auto}
.btn-comprobante{background:#000;color:#fff;font-weight:500;font-size:16px;padding:0 30px;height:64px;min-width:220px}
.comp-estado{font-size:13px;color:var(--gris-osc);margin-top:10px;text-align:right;max-width:260px;word-break:break-all}
.comp-estado .ok{color:#0a8f3c;font-weight:700}
.fila-wa{display:flex;justify-content:flex-end;margin-top:26px}
.link-wa{font-weight:500;text-decoration:underline;font-size:16px}
.fila-final{display:flex;justify-content:space-between;align-items:center;gap:20px;margin-top:44px;flex-wrap:wrap}
.fila-final .total{font-weight:700;font-size:40px}
.btn-procesar{background:#000;color:#fff;font-weight:700;font-size:17px;height:64px;padding:0 36px;min-width:230px}
.btn-procesar[disabled]{opacity:.5}

/* ============ GRACIAS ============ */
.gracias-hero{position:relative;height:70vh;min-height:480px;background:#111}
.gracias-hero img{width:100%;height:100%;object-fit:cover}
.gracias-marca{position:absolute;left:0;right:0;bottom:38px;display:flex;flex-direction:column;align-items:center;gap:14px;padding:0 20px;text-align:center}
.gracias-marca .logo-img{height:52px}
.gracias-marca h1{color:#fff;font-weight:700;font-size:40px;line-height:1.1}
.gracias-negro{background:#000;color:#fff;text-align:center;padding:44px 24px 96px}
.gracias-negro .txt{font-size:14px;color:#d8d8d8;line-height:1.6}
.gracias-links{display:flex;justify-content:center;gap:48px;margin-top:74px;flex-wrap:wrap}
.gracias-links a{color:#fff;font-weight:700;font-size:19px;text-decoration:underline}
.gracias-orden{margin-top:56px;font-size:12px;color:#8a8a8a}

/* ============ FOOTER ============ */
.footer{background:#000;color:#fff;padding:56px 24px 30px;padding-bottom:calc(30px + env(safe-area-inset-bottom))}
.footer-in{max-width:1100px;margin:0 auto}

.footer-tag{color:#c9c9c9;font-size:14px;margin-top:10px}
.footer-cols{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:28px;margin-top:40px}
.footer-cols h4{font-weight:700;font-size:14px;margin-bottom:14px}
.footer-cols a,.footer-cols button{display:block;color:#c9c9c9;font-size:14px;text-decoration:none;margin-bottom:10px;text-align:left;padding:0}
.footer-legal{display:flex;justify-content:space-between;align-items:center;gap:14px;flex-wrap:wrap;border-top:1px solid #222;margin-top:44px;padding-top:22px;color:#8a8a8a;font-size:12px}
.btn-admin{color:#555;font-size:12px}

/* ============ LOGIN MODAL ============ */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.66);z-index:500;display:none;align-items:center;justify-content:center;padding:24px}
.modal-overlay.abierto{display:flex}
.modal-card{background:#fff;color:#000;width:100%;max-width:400px;padding:36px 28px}
.modal-card h3{font-weight:700;font-size:24px;margin-bottom:22px}
.modal-card .inp-env{margin-top:12px;height:58px}
.modal-card .btn-negro{margin-top:22px;height:56px}
.modal-err{color:var(--err);font-size:13px;margin-top:12px;min-height:16px}
.modal-cerrar{display:block;margin:16px auto 0;font-size:13px;color:var(--gris-med);text-decoration:underline}

/* ============ TOAST ============ */
#toasts{position:fixed;left:50%;transform:translateX(-50%);bottom:calc(26px + env(safe-area-inset-bottom));z-index:800;display:flex;flex-direction:column;gap:8px;width:min(92vw,420px)}
.toast{background:#000;color:#fff;font-size:14px;padding:14px 18px;text-align:center;animation:vistaIn .2s var(--ease)}

/* ============ ADMIN HUD ============ */
.hud{background:var(--hud-bg);color:#fff;min-height:100vh;display:flex;flex-direction:column}
@media(min-width:900px){.hud{flex-direction:row}}
.hud-side{background:var(--hud-card);border-bottom:1px solid var(--hud-borde);display:flex;overflow-x:auto;flex:0 0 auto;scrollbar-width:none;padding-top:env(safe-area-inset-top)}
.hud-side::-webkit-scrollbar{display:none}
@media(min-width:900px){.hud-side{flex-direction:column;width:230px;border-bottom:none;border-right:1px solid var(--hud-borde);padding:24px 0;overflow:visible}}
.hud-marca{display:none}
@media(min-width:900px){.hud-marca{display:block;padding:0 22px 26px;font-weight:700;font-size:19px}}
.hud-tab{color:#9a9a9a;font-weight:500;font-size:14px;padding:16px 18px;white-space:nowrap;text-align:left;border-left:2px solid transparent}
.hud-tab.activo{color:#fff;font-weight:700}
@media(min-width:900px){.hud-tab.activo{border-left-color:#fff;background:rgba(255,255,255,.04)}}
.hud-main{flex:1;padding:26px 20px 80px;max-width:1100px}
@media(min-width:900px){.hud-main{padding:36px 36px 90px}}
.hud-main h2{font-weight:700;font-size:24px;margin-bottom:22px}
.hud-kpis{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px}
.kpi{background:var(--hud-card);border:1px solid var(--hud-borde);padding:18px}
.kpi .v{font-weight:700;font-size:28px}
.kpi .l{color:#9a9a9a;font-size:12px;margin-top:6px;line-height:1.4}
.kpi.warn .v{color:var(--warn)}
.hud-card{background:var(--hud-card);border:1px solid var(--hud-borde);padding:20px;margin-top:18px}
.hud-card h3{font-weight:700;font-size:16px;margin-bottom:14px}
.hud-btn{background:#fff;color:#000;font-weight:700;font-size:14px;padding:12px 20px}
.hud-btn.sec{background:transparent;color:#fff;border:1px solid var(--hud-borde)}
.hud-btn.peligro{background:transparent;color:var(--err);border:1px solid var(--err)}
.hud-btn.mini{padding:7px 12px;font-size:12px}
.hud-btn[disabled]{opacity:.4;cursor:not-allowed}
.hud-lista{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.hud-fila{background:var(--hud-card);border:1px solid var(--hud-borde);padding:14px 16px;display:flex;align-items:center;gap:14px;flex-wrap:wrap}
.hud-fila .grow{flex:1;min-width:150px}
.hud-fila .tt{font-weight:700;font-size:15px}
.hud-fila .st{color:#9a9a9a;font-size:12px;margin-top:3px}
.hud-thumb{width:46px;height:46px;object-fit:cover;background:#222;flex:0 0 auto}
.pill{font-weight:700;font-size:11px;padding:5px 10px;border-radius:20px;letter-spacing:.04em}
.pill.pendiente{background:rgba(242,193,78,.16);color:var(--warn)}
.pill.verificado{background:rgba(62,207,106,.14);color:var(--ok)}
.pill.rechazado{background:rgba(229,72,77,.14);color:var(--err)}
.pill.enviado{background:rgba(138,180,248,.14);color:var(--info)}
.hud-inp,.hud-sel,.hud-txt{width:100%;background:#0f0f0f;border:1px solid var(--hud-borde);color:#fff;padding:12px 14px;font-size:14px;margin-top:8px}
.hud-txt{min-height:90px;resize:vertical}
.hud-lbl{display:block;color:#9a9a9a;font-size:12px;margin-top:16px}
.hud-grid2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
@media(max-width:600px){.hud-grid2{grid-template-columns:1fr}}
.hud-filtros{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:6px}
.hud-filtros button{border:1px solid var(--hud-borde);color:#9a9a9a;font-size:12px;font-weight:500;padding:8px 14px}
.hud-filtros button.activo{background:#fff;color:#000;border-color:#fff;font-weight:700}
.hud-check{display:flex;align-items:center;gap:10px;margin-top:16px;color:#ddd;font-size:14px}
.hud-check input{width:18px;height:18px;accent-color:#fff}
.var-matriz{margin-top:14px;display:flex;flex-direction:column;gap:8px}
.var-fila{display:flex;align-items:center;gap:10px;background:#0f0f0f;border:1px solid var(--hud-borde);padding:10px 12px}
.var-fila .nom{flex:1;font-size:13px;color:#ddd}
.var-fila input{width:88px;background:#000;border:1px solid var(--hud-borde);color:#fff;padding:8px;text-align:center;font-size:14px}
.img-lista{display:flex;flex-wrap:wrap;gap:10px;margin-top:12px}
.img-item{position:relative;width:96px}
.img-item img{width:96px;height:96px;object-fit:cover;border:1px solid var(--hud-borde)}
.img-item.portada img{border-color:#fff}
.img-item .acc{display:flex;gap:4px;margin-top:4px}
.img-item .acc button{flex:1;border:1px solid var(--hud-borde);color:#ccc;font-size:11px;padding:3px 0}
.img-item .tag-portada{position:absolute;top:4px;left:4px;background:#fff;color:#000;font-size:9px;font-weight:700;padding:2px 6px}
.ped-detalle{border-top:1px solid var(--hud-borde);margin-top:14px;padding-top:14px;width:100%;font-size:13px;color:#ddd;line-height:1.7}
.ped-detalle h4{font-weight:700;font-size:13px;color:#fff;margin:14px 0 6px}
.ped-detalle .comp-img{max-width:340px;border:1px solid var(--hud-borde);margin-top:8px}
.ped-acciones{display:flex;gap:10px;flex-wrap:wrap;margin-top:16px}
.hud-vacio{color:#777;font-size:13px;padding:20px 0}
.spin::after{content:'';display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,.35);border-top-color:#fff;border-radius:50%;margin-left:8px;vertical-align:-2px;animation:spin .7s linear infinite}
.btn-negro.spin::after,.btn-procesar.spin::after,.hud-btn.spin::after{content:''}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

function _esc(s){

function fmtMonto(n){
  var v = Number(n) || 0;
  var s = (Math.round(v * 100) / 100).toFixed(2);
  if (s.slice(-3) === '.00') s = s.slice(0, -3);
  return s + '$';

  t.textContent = msg;

  setTimeout(function(){ if (t.parentNode) t.parentNode.removeChild(t); }, 3800);

/* ================= ESTADO ================= */
var estado = {
  config: null,
  categorias: [],
  productos: [],
  catActiva: 'todo',
  descuento: null,
  compPath: null,
  envio: { nombre:'', apellido:'', docTipo:'V', docNumero:'', celular:'', direccion:'' },
  ultimaOrden: null
};

/* ================= CARRITO ================= */
function cartGet(){
  try {
    var raw = localStorage.getItem(CART_KEY);
    var arr = raw ? JSON.parse(raw) : [];
    return Array.isArray(arr) ? arr : [];
  } catch (e) { return []; }
}
function cartSet(items){
  try { localStorage.setItem(CART_KEY, JSON.stringify(items)); } catch (e) {}
  cartBadge();
}
function cartAdd(item){
  var items = cartGet();
  var ya = null;
  for (var i = 0; i < items.length; i++) {
    if (items[i].variant_id === item.variant_id) { ya = items[i]; break; }
  }
  if (ya) ya.qty += item.qty; else items.push(item);
  cartSet(items);
}
function cartRemove(variantId){
  var items = cartGet().filter(function(it){ return it.variant_id !== variantId; });
  cartSet(items);
}
function cartCount(){
  return cartGet().reduce(function(a, it){ return a + it.qty; }, 0);
}
function cartSubtotal(items){
  return items.reduce(function(a, it){ return a + (Number(it.precio) * it.qty); }, 0);
}
function cartBadge(){
  var n = cartCount();
  var b = q('#badgeCarrito');
  if (b) {
    if (n > 0) { b.style.display = 'flex'; b.textContent = n > 99 ? '99+' : String(n); }
    else b.style.display = 'none';
  }
}

/* ================= DESCUENTO ================= */
function calcDescuento(subtotal){
  var d = estado.descuento;
  if (!d) return 0;
  var monto = d.tipo === 'porcentaje' ? subtotal * (Number(d.valor) / 100) : Number(d.valor);
  if (monto > subtotal) monto = subtotal;
  return Math.round(monto * 100) / 100;
}
function validarCodigo(code, cb){
  sb.from('store_discount_codes').select('*').ilike('codigo', code).eq('activo', true).limit(1).then(function(res){
    if (res.error || !res.data || !res.data.length) { cb(null); return; }
    var d = res.data[0];
    var vivo = (!d.expira || new Date(d.expira) > new Date()) && (d.usos_max === null || d.usos < d.usos_max);
    cb(vivo ? d : null);
  }, function(){ cb(null); });
}

/* ================= ROUTER ================= */
var primeraRuta = true;
function ruta(){
  var h = location.hash || '#/';
  var partes = h.replace(/^#\//, '').split('/');
  return { seg: partes, raw: h };
}
function navegar(){
  var r = ruta();
  var render;
  if (r.seg[0] === '' || r.seg[0] === undefined) render = renderHome;
  else if (r.seg[0] === 'producto' && r.seg[1]) render = function(){ renderProducto(r.seg[1]); };
  else if (r.seg[0] === 'checkout') render = renderCheckout;
  else if (r.seg[0] === 'envio') render = renderEnvio;
  else if (r.seg[0] === 'gracias') render = renderGracias;
  else if (r.seg[0] === 'admin') render = renderAdmin;
  else render = renderHome;

  var app = q('#app');
  if (primeraRuta) {

/* ================= CARGA INICIAL / SPLASH ================= */
var splashTarget = 10;
var splashActual = 0;
var splashFin = false;
var splashUltimo = 0;
function splashLoop(ts){
  var s = q('#splash');
  if (!s || s.classList.contains('salir')) return;
  if (!splashUltimo) splashUltimo = ts;
  var dt = Math.min(64, ts - splashUltimo);
  splashUltimo = ts;
  if (!splashFin && splashTarget < 92) splashTarget += dt * 0.004;
  splashActual += (splashTarget - splashActual) * Math.min(1, dt * 0.0075);
  var bar = q('#splashBar');
  if (bar) bar.style.width = splashActual.toFixed(2) + '%';
  if (splashFin && splashActual > 99.2) {
    if (bar) bar.style.width = '100%';
    setTimeout(function(){
      s.classList.add('salir');
      setTimeout(function(){ if (s.parentNode) s.parentNode.removeChild(s); }, 700);
    }, 90);
    return;
  }
  requestAnimationFrame(splashLoop);
}
function splashAvanza(paso){
  splashTarget = Math.min(96, splashTarget + paso);
}
function splashCerrar(){
  splashFin = true;
  splashTarget = 100;
}
function cargarBase(cb){
  var pendientes = 3;
  function listo(){ pendientes--; splashAvanza(25); if (pendientes === 0) cb(); }
  sb.from('store_config').select('*').limit(1).then(function(res){
    if (!res.error && res.data && res.data.length) estado.config = res.data[0];
    listo();
  }, function(){ listo(); });
  sb.from('store_categories').select('*').order('orden').then(function(res){
    if (!res.error && res.data) estado.categorias = res.data;
    listo();
  }, function(){ listo(); });
  sb.from('store_products').select('*, store_variants(*)').eq('eliminado', false).order('created_at', { ascending: false }).then(function(res){
    if (!res.error && res.data) estado.productos = res.data;
    listo();
  }, function(){ listo(); });
}
function stockTotal(p){
  var vs = p.store_variants || [];
  return vs.reduce(function(a, v){ return a + (Number(v.stock) || 0); }, 0);
}

      docTipo: q('#fDocTipo', app).value,

      celular: q('#fCel', app).value.trim(),

    };

  q('#fDoc', app).addEventListener('input', function(ev){ ev.target.value = ev.target.value.replace(/[^0-9]/g, ''); });

  q('#btnCopiar', app).addEventListener('click', function(){

    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(id).then(function(){ toast('ID copiado'); }, function(){ toast('No se pudo copiar'); });
    } else { toast('No se pudo copiar'); }

    var num = (estado.config && estado.config.whatsapp) ? String(estado.config.whatsapp).replace(/[^0-9]/g, '') : '';
    if (!num) { ev.preventDefault(); toast('WhatsApp no configurado'); return; }
    var resumen = cartGet().map(function(it){
      return 'X' + it.qty + ' ' + it.nombre + (it.talla ? ' talla ' + it.talla : '') + (it.color ? ' ' + it.color : '');
    }).join(', ');
    var msg = 'Hola, quiero pagar mi pedido de Ruedda Store: ' + resumen + '. Total: ' + fmtMonto(total);
    linkWa.href = 'https://wa.me/' + num + '?text=' + encodeURIComponent(msg);
  });

  var btnComp = q('#btnComp', app);
  var fileComp = q('#fileComp', app);
  btnComp.addEventListener('click', function(){ fileComp.click(); });
  fileComp.addEventListener('change', function(){
    var f = fileComp.files && fileComp.files[0];

    if (f.size > 5 * 1024 * 1024) { toast('Archivo muy pesado (max 5MB)'); return; }
    var okTipos = ['image/jpeg', 'image/png', 'image/webp', 'application/pdf'];
    if (okTipos.indexOf(f.type) < 0) { toast('Formato no permitido'); return; }
    var ext = f.name.split('.').pop().toLowerCase();
    var path = 'receipts/' + Date.now() + '_' + Math.random().toString(36).slice(2, 8) + '.' + ext;
    btnComp.disabled = true;
    btnComp.textContent = 'Subiendo...';
    sb.storage.from('store-receipts').upload(path, f, { contentType: f.type }).then(function(res){
      btnComp.disabled = false;
      btnComp.textContent = 'Subir comprobante';
      if (res.error) { toast('Error subiendo comprobante'); return; }
      estado.compPath = path;
      q('#compEstado', app).innerHTML = '<span class="ok">\u2713 Comprobante subido</span><br>' + _esc(f.name);
    }, function(){

      btnComp.textContent = 'Subir comprobante';
      toast('Error subiendo comprobante');
    });
  });

  q('#btnProcesar', app).addEventListener('click', function(){
    guardarCampos();

      toast('Completa todos los campos'); return;
    }
    if (ev2.celular.length !== 10) { toast('Celular invalido: deben ser 10 digitos'); return; }
    if (!estado.compPath) {
      var sigue = window.confirm('No subiste comprobante. Tu pedido quedara pendiente hasta enviarlo por Whatsapp. Continuar?');
      if (!sigue) return;
    }
    procesarPedido(q('#btnProcesar', app));
  });
}

function genNumeroOrden(){
  var chars = 'ABCDEFGHJKMNPQRSTUVWXYZ23456789';
  var s = '';
  for (var i = 0; i < 4; i++) s += chars.charAt(Math.floor(Math.random() * chars.length));
  return 'RS-' + s;
}
function procesarPedido(btn){
  btn.disabled = true;
  btn.textContent = 'Procesando...';
  var items = cartGet();
  var ids = items.map(function(it){ return it.variant_id; });
  // refetch de precios actuales: no confiar en localStorage viejo
  sb.from('store_variants').select('id, stock, store_products(id, nombre, precio, activo, eliminado)').in('id', ids).then(function(res){
    if (res.error) { falla('Error verificando precios'); return; }
    var mapa = {};
    (res.data || []).forEach(function(v){ mapa[v.id] = v; });
    var vivos = [];
    for (var i = 0; i < items.length; i++) {
      var it = items[i];
      var v = mapa[it.variant_id];
      if (!v || !v.store_products || !v.store_products.activo || v.store_products.eliminado) { falla('Un producto ya no esta disponible: ' + it.nombre); return; }
      if (Number(v.stock) < it.qty) { falla('Sin stock suficiente: ' + it.nombre); return; }
      vivos.push({
        variant_id: it.variant_id,
        product_nombre: v.store_products.nombre,
        talla: it.talla, color: it.color,
        precio_unit: Number(v.store_products.precio),
        qty: it.qty,
        subtotal: Math.round(Number(v.store_products.precio) * it.qty * 100) / 100
      });
    }
    var sub = vivos.reduce(function(a, x){ return a + x.subtotal; }, 0);
    sub = Math.round(sub * 100) / 100;
    var desc = calcDescuento(sub);
    var total = Math.max(0, Math.round((sub - desc) * 100) / 100);
    crearOrden(vivos, sub, desc, total, 0);
  }, function(){ falla('Error de conexion'); });

  function falla(msg){
    toast(msg);
    btn.disabled = false;
    btn.textContent = 'Procesar pedido';
  }
  function genUuid(){
    if (window.crypto && crypto.randomUUID) return crypto.randomUUID();
    return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(ch){
      var r = Math.random() * 16 | 0;
      return (ch === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
    });
  }
  function crearOrden(vivos, sub, desc, total, intento){
    if (intento >= 5) { falla('No se pudo generar el numero de pedido'); return; }
    var e = estado.envio;
    var orden = {
      id: genUuid(),
      numero: genNumeroOrden(), estado: 'pendiente',
      nombre: e.nombre, apellido: e.apellido,
      doc_tipo: e.docTipo, doc_numero: e.docNumero,
      celular: e.celular, direccion_agencia: e.direccion,
      subtotal: sub, descuento: desc,
      codigo_descuento: desc > 0 && estado.descuento ? estado.descuento.codigo : null,
      total: total,
      comprobante_path: estado.compPath,
      metodo: estado.compPath ? 'binance' : 'whatsapp'
    };
    sb.from('store_orders').insert(orden).then(function(res){
      if (res.error) {
        if (String(res.error.code) === '23505') { crearOrden(vivos, sub, desc, total, intento + 1); return; }
        falla('Error creando el pedido'); return;
      }
      var oid = orden.id;
      var numero = orden.numero;
      var filas = vivos.map(function(x){
        return { order_id: oid, variant_id: x.variant_id, product_nombre: x.product_nombre, talla: x.talla, color: x.color, precio_unit: x.precio_unit, qty: x.qty, subtotal: x.subtotal };
      });
      sb.from('store_order_items').insert(filas).then(function(res2){
        if (res2.error) { falla('Error guardando los items'); return; }
        function terminar(){
          estado.ultimaOrden = numero;
          estado.descuento = null;
          estado.compPath = null;
          estado.envio = { nombre:'', apellido:'', docTipo:'V', docNumero:'', celular:'', direccion:'' };
          cartSet([]);
          location.hash = '#/gracias';
        }
        if (desc > 0 && orden.codigo_descuento) {
          sb.rpc('store_apply_discount_use', { code: orden.codigo_descuento }).then(function(){ terminar(); }, function(){ terminar(); });
        } else terminar();
      }, function(){ falla('Error guardando los items'); });
    }, function(){ falla('Error de conexion'); });
  }
}

/* ================= LOGIN ADMIN ================= */
function abrirLogin(){
  sb.auth.getSession().then(function(res){
    var s = res.data && res.data.session;
    if (s && s.user && esSuperadmin(s.user.email)) { location.hash = '#/admin'; return; }
    q('#modalLogin').classList.add('abierto');
    q('#loginErr').textContent = '';
  }, function(){ q('#modalLogin').classList.add('abierto'); });
}
function wireLogin(){
  var modal = q('#modalLogin');
  q('#loginCerrar').addEventListener('click', function(){ modal.classList.remove('abierto'); });
  modal.addEventListener('click', function(ev){ if (ev.target === modal) modal.classList.remove('abierto'); });
  q('#loginBtn').addEventListener('click', function(){
    var btn = q('#loginBtn');
    var email = q('#loginEmail').value.trim();
    var pass = q('#loginPass').value;
    var err = q('#loginErr');
    err.textContent = '';
    if (!email || !pass) { err.textContent = 'Completa email y contrasena'; return; }
    btn.disabled = true;
    btn.textContent = 'Procesando...';
    sb.auth.signInWithPassword({ email: email, password: pass }).then(function(res){
      btn.disabled = false;
      btn.textContent = 'Iniciar sesion';
      if (res.error) { err.textContent = res.error.message || 'Credenciales incorrectas'; return; }
      var u = res.data && res.data.user;
      if (!u || !esSuperadmin(u.email)) {
        sb.auth.signOut();
        err.textContent = 'Acceso denegado';
        return;
      }
      modal.classList.remove('abierto');
      q('#loginPass').value = '';
      location.hash = '#/admin';
    }, function(){
      btn.disabled = false;
      btn.textContent = 'Iniciar sesion';
      err.textContent = 'Error de conexion';
    });
  });
}

        '<input class="hud-inp" id="pColores" value="' + _esc(coloresSet.map(function(c){ return c.hex ? c.nombre + ':' + c.hex : c.nombre; }).join(', ')) + '">' +
      '</div>' +
      '<label class="hud-lbl">Inventario por variante</label>' +
      '<div class="var-matriz" id="pMatriz"></div>' +
      '<div class="ped-acciones"><button class="hud-btn" id="pGuardar">' + (esEdit ? 'Guardar cambios' : 'Crear producto') + '</button>' +
      '<button class="hud-btn sec" id="pCancelar">Cancelar</button></div>' +
    '</div>';
    wrap.scrollIntoView({ block: 'start' });

    function pintarImgs(){
      var cont = q('#pImgLista');
      cont.innerHTML = imgs.map(function(path, i){
        return '<div class="img-item' + (i === 0 ? ' portada' : '') + '">' +
          (i === 0 ? '<span class="tag-portada">PORTADA</span>' : '') +
          '<img src="' + _esc(pubUrl(path)) + '" alt="">' +
          '<div class="acc">' +
            '<button type="button" data-imup="' + i + '">\u2191</button>' +
            '<button type="button" data-imdn="' + i + '">\u2193</button>' +
            '<button type="button" data-import="' + i + '">\u2605</button>' +
            '<button type="button" data-imdel="' + i + '">\u00d7</button>' +
          '</div></div>';
      }).join('');
      qa('[data-imup]', cont).forEach(function(b){ b.addEventListener('click', function(){
        var i = Number(b.getAttribute('data-imup'));
        if (i > 0) { var t = imgs[i - 1]; imgs[i - 1] = imgs[i]; imgs[i] = t; pintarImgs(); }
      }); });
      qa('[data-imdn]', cont).forEach(function(b){ b.addEventListener('click', function(){
        var i = Number(b.getAttribute('data-imdn'));
        if (i < imgs.length - 1) { var t = imgs[i + 1]; imgs[i + 1] = imgs[i]; imgs[i] = t; pintarImgs(); }
      }); });
      qa('[data-import]', cont).forEach(function(b){ b.addEventListener('click', function(){
        var i = Number(b.getAttribute('data-import'));
        var t = imgs.splice(i, 1)[0]; imgs.unshift(t); pintarImgs();
      }); });
      qa('[data-imdel]', cont).forEach(function(b){ b.addEventListener('click', function(){
        imgs.splice(Number(b.getAttribute('data-imdel')), 1); pintarImgs();
      }); });
    }
    pintarImgs();

    function redimensionar(file, cb){
      var img = new Image();
      var url = URL.createObjectURL(file);
      img.onload = function(){
        var max = 1600;
        var w = img.width, h = img.height;
        if (w <= max && h <= max) { URL.revokeObjectURL(url); cb(file); return; }
        var esc = max / Math.max(w, h);
        var cv = document.createElement('canvas');
        cv.width = Math.round(w * esc);
        cv.height = Math.round(h * esc);
        cv.getContext('2d').drawImage(img, 0, 0, cv.width, cv.height);
        cv.toBlob(function(blob){ URL.revokeObjectURL(url); cb(blob || file); }, 'image/jpeg', 0.86);
      };
      img.onerror = function(){ URL.revokeObjectURL(url); cb(file); };
      img.src = url;
    }
    q('#pImgs').addEventListener('change', function(ev){
      var files = Array.prototype.slice.call(ev.target.files || []);
      if (!files.length) return;
      if (imgs.length + files.length > 6) { toast('Maximo 6 imagenes'); return; }
      var restantes = files.length;
      files.forEach(function(f){
        redimensionar(f, function(blob){
          var path = 'products/' + Date.now() + '_' + Math.random().toString(36).slice(2, 8) + '.jpg';
          sb.storage.from('store-products').upload(path, blob, { contentType: 'image/jpeg' }).then(function(r){
            restantes--;
            if (r.error) toast('Error subiendo una imagen');
            else imgs.push(path);
            if (restantes === 0) pintarImgs();
          }, function(){ restantes--; toast('Error subiendo una imagen'); if (restantes === 0) pintarImgs(); });
        });
      });
      ev.target.value = '';
    });

    function tallasActuales(){
      if (!q('#pTieneTallas').checked) return [];
      var sel = qa('[data-tsel].activo', wrap).map(function(b){ return b.getAttribute('data-tsel'); });
      q('#pTallasExtra').value.split(',').forEach(function(t){
        t = t.trim();
        if (t && sel.indexOf(t) < 0) sel.push(t);
      });
      return sel;
    }
    function coloresActuales(){
      if (!q('#pTieneColores').checked) return [];
      return q('#pColores').value.split(',').map(function(s){
        var par = s.trim().split(':');
        return par[0] ? { nombre: par[0].trim(), hex: (par[1] || '').trim() } : null;
      }).filter(Boolean);
    }
    function pintarMatriz(){
      var ts = tallasActuales();
      var cs = coloresActuales();
      var combos = [];
      if (!ts.length && !cs.length) combos.push({ talla: null, color: null });
      else if (ts.length && !cs.length) ts.forEach(function(t){ combos.push({ talla: t, color: null }); });
      else if (!ts.length && cs.length) cs.forEach(function(c){ combos.push({ talla: null, color: c.nombre, hex: c.hex }); });
      else ts.forEach(function(t){ cs.forEach(function(c){ combos.push({ talla: t, color: c.nombre, hex: c.hex }); }); });
      var m = q('#pMatriz');
      m.innerHTML = combos.map(function(cb, i){
        var key = (cb.talla || '') + '|' + (cb.color || '');
        var val = stockMap[key] !== undefined ? stockMap[key] : 0;
        var nom = (cb.talla || '') + (cb.talla && cb.color ? ' / ' : '') + (cb.color || '');
        if (!nom) nom = 'Variante unica';
        return '<div class="var-fila"><span class="nom">' + _esc(nom) + '</span>' +
          '<input type="number" min="0" data-vkey="' + _esc(key) + '" value="' + val + '" aria-label="Stock ' + _esc(nom) + '"></div>';
      }).join('');
      qa('[data-vkey]', m).forEach(function(inp){
        inp.addEventListener('change', function(){ stockMap[inp.getAttribute('data-vkey')] = Math.max(0, Number(inp.value) || 0); });
      });
      m.dataset.combos = JSON.stringify(combos);
    }
    q('#pTieneTallas').addEventListener('change', function(ev){
      q('#pTallasWrap').style.display = ev.target.checked ? 'block' : 'none';
      pintarMatriz();
    });
    q('#pTieneColores').addEventListener('change', function(ev){
      q('#pColoresWrap').style.display = ev.target.checked ? 'block' : 'none';
      pintarMatriz();
    });
    qa('[data-tsel]', wrap).forEach(function(b){
      b.addEventListener('click', function(){ b.classList.toggle('activo'); pintarMatriz(); });
    });
    q('#pTallasExtra').addEventListener('change', pintarMatriz);
    q('#pColores').addEventListener('change', pintarMatriz);
    pintarMatriz();

    q('#pCancelar').addEventListener('click', function(){ wrap.innerHTML = ''; });
    q('#pGuardar').addEventListener('click', function(){
      var nombre = q('#pNombre').value.trim();
      var precio = Number(q('#pPrecio').value);
      if (!nombre || !(precio >= 0)) { toast('Nombre y precio son obligatorios'); return; }
      var ref = q('#pRef').value.trim() || ('REF' + Math.round(precio));
      var datos = {
        nombre: nombre,
        categoria_id: q('#pCat').value || null,
        descripcion: q('#pDesc').value.trim(),
        precio: precio,
        ref_badge: ref,
        activo: q('#pActivo').checked,
        imagenes: imgs
      };
      var combos = JSON.parse(q('#pMatriz').dataset.combos || '[]');
      var btn = q('#pGuardar');
      btn.disabled = true;
      btn.textContent = 'Guardando...';
      function despuesProd(pid){
        sincronizarVariantes(pid, combos, function(ok){
          btn.disabled = false;
          btn.textContent = esEdit ? 'Guardar cambios' : 'Crear producto';
          if (!ok) { toast('Producto guardado pero fallo el inventario'); return; }
          toast(esEdit ? 'Producto actualizado' : 'Producto creado');
          wrap.innerHTML = '';
          recargarCatalogo(function(){ cargarListaProd(); });
        });
      }
      if (esEdit) {
        sb.from('store_products').update(datos).eq('id', p.id).then(function(r){
          if (r.error) { btn.disabled = false; btn.textContent = 'Guardar cambios'; toast('Error guardando'); return; }
          despuesProd(p.id);
        }, function(){ btn.disabled = false; btn.textContent = 'Guardar cambios'; toast('Error de conexion'); });
      } else {
        sb.from('store_products').insert(datos).select('id').single().then(function(r){
          if (r.error) { btn.disabled = false; btn.textContent = 'Crear producto'; toast('Error creando'); return; }
          despuesProd(r.data.id);
        }, function(){ btn.disabled = false; btn.textContent = 'Crear producto'; toast('Error de conexion'); });
      }
    });

    function sincronizarVariantes(pid, combos, cb){
      sb.from('store_variants').select('*').eq('product_id', pid).then(function(r){
        if (r.error) { cb(false); return; }
        var existentes = r.data || [];
        var claves = {};
        combos.forEach(function(c){ claves[(c.talla || '') + '|' + (c.color || '')] = c; });
        var borrar = existentes.filter(function(v){ return !claves[(v.talla || '') + '|' + (v.color || '')]; }).map(function(v){ return v.id; });
        var ops = [];
        combos.forEach(function(c){
          var key = (c.talla || '') + '|' + (c.color || '');
          var stock = stockMap[key] !== undefined ? stockMap[key] : 0;
          var ya = null;
          existentes.forEach(function(v){ if ((v.talla || '') + '|' + (v.color || '') === key) ya = v; });
          if (ya) ops.push({ tipo: 'up', id: ya.id, stock: stock, hex: c.hex || null });
          else ops.push({ tipo: 'in', fila: { product_id: pid, talla: c.talla, color: c.color, color_hex: c.hex || null, stock: stock } });
        });
        var pend = ops.length + (borrar.length ? 1 : 0);
        var fallo = false;
        function fin(err){ if (err) fallo = true; pend--; if (pend <= 0) cb(!fallo); }
        if (!pend) { cb(true); return; }
        if (borrar.length) sb.from('store_variants').delete().in('id', borrar).then(function(r2){ fin(!!r2.error); }, function(){ fin(true); });
        ops.forEach(function(op){
          if (op.tipo === 'up') sb.from('store_variants').update({ stock: op.stock, color_hex: op.hex }).eq('id', op.id).then(function(r2){ fin(!!r2.error); }, function(){ fin(true); });
          else sb.from('store_variants').insert(op.fila).then(function(r2){ fin(!!r2.error); }, function(){ fin(true); });
        });
      }, function(){ cb(false); });
    }
  }
}
function recargarCatalogo(cb){
  sb.from('store_products').select('*, store_variants(*)').eq('eliminado', false).order('created_at', { ascending: false }).then(function(res){
    if (!res.error && res.data) estado.productos = res.data;
    if (cb) cb();
  }, function(){ if (cb) cb(); });
}

/* ---- Categorias ---- */
function adminCategorias(main){
  main.innerHTML = '<h2>Categorias</h2>' +
    '<div class="hud-card"><h3>Crear categoria</h3><div class="hud-grid2">' +
    '<div><label class="hud-lbl" for="cNombre">Nombre</label><input class="hud-inp" id="cNombre"></div>' +
    '<div><label class="hud-lbl" for="cOrden">Orden</label><input class="hud-inp" id="cOrden" type="number" value="0"></div></div>' +
    '<label class="hud-check"><input type="checkbox" id="cTalla"> Requiere talla</label>' +

    '<div class="hud-lista" id="listaCats"><div class="hud-vacio">Cargando...</div></div>';

  function slugify(s){
    return s.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  }
  function cargar(){
    sb.from('store_categories').select('*').order('orden').then(function(r){
      var cont = q('#listaCats');
      if (!cont) return;
      var cs = r.data || [];
      estado.categorias = cs;
      if (!cs.length) { cont.innerHTML = '<div class="hud-vacio">Sin categorias.</div>'; return; }
      cont.innerHTML = cs.map(function(c){
        return '<div class="hud-fila"><div class="grow"><div class="tt">' + _esc(c.nombre) + '</div>' +
          '<div class="st">slug: ' + _esc(c.slug) + ' \u00b7 orden: ' + c.orden + (c.requiere_talla ? ' \u00b7 requiere talla' : '') + '</div></div>' +
          '<button class="hud-btn sec mini" data-cedit="' + _esc(c.id) + '">Editar</button>' +
          '<button class="hud-btn peligro mini" data-cdel="' + _esc(c.id) + '">Eliminar</button></div>';
      }).join('');
      qa('[data-cedit]', cont).forEach(function(b){
        b.addEventListener('click', function(){
          var c = null;
          cs.forEach(function(x){ if (x.id === b.getAttribute('data-cedit')) c = x; });
          var nombre = window.prompt('Nombre de la categoria:', c.nombre);
          if (nombre === null) return;
          var orden = window.prompt('Orden:', String(c.orden));
          if (orden === null) return;
          var talla = window.confirm('Requiere talla? Aceptar = si, Cancelar = no');
          sb.from('store_categories').update({ nombre: nombre.trim(), slug: slugify(nombre), orden: Number(orden) || 0, requiere_talla: talla }).eq('id', c.id).then(function(r2){
            if (r2.error) { toast('Error guardando'); return; }
            toast('Categoria actualizada');
            cargar();
          }, function(){ toast('Error de conexion'); });
        });
      });
      qa('[data-cdel]', cont).forEach(function(b){
        b.addEventListener('click', function(){
          var id = b.getAttribute('data-cdel');
          sb.from('store_products').select('id', { count: 'exact', head: true }).eq('categoria_id', id).eq('eliminado', false).then(function(r2){
            if ((r2.count || 0) > 0) { toast('No se puede eliminar: tiene productos asociados'); return; }
            if (!window.confirm('Eliminar esta categoria?')) return;
            sb.from('store_categories').delete().eq('id', id).then(function(r3){
              if (r3.error) { toast('Error eliminando'); return; }
              toast('Categoria eliminada');
              cargar();
            }, function(){ toast('Error de conexion'); });
          }, function(){ toast('Error de conexion'); });
        });
      });
    }, function(){ toast('Error cargando categorias'); });
  }
  q('#cCrear').addEventListener('click', function(){
    var nombre = q('#cNombre').value.trim();
    if (!nombre) { toast('Escribe el nombre'); return; }
    sb.from('store_categories').insert({ nombre: nombre, slug: slugify(nombre), orden: Number(q('#cOrden').value) || 0, requiere_talla: q('#cTalla').checked }).then(function(r){
      if (r.error) { toast('Error creando (slug repetido?)'); return; }
      toast('Categoria creada');
      q('#cNombre').value = '';
      cargar();
    }, function(){ toast('Error de conexion'); });
  });
  cargar();
}

  var conteos = {};

  function pintarFiltros(){
    q('#pedFiltros').innerHTML = estados.map(function(e){
      var n = conteos[e] !== undefined ? ' (' + conteos[e] + ')' : '';
      return '<button data-pf="' + e + '" class="' + (pedFiltro === e ? 'activo' : '') + '">' + e.charAt(0).toUpperCase() + e.slice(1) + n + '</button>';
    }).join('');
    qa('[data-pf]').forEach(function(b){
      b.addEventListener('click', function(){ pedFiltro = b.getAttribute('data-pf'); cargar(); });
    });
  }
  function contar(){
    var pend = 4;
    ['pendiente', 'verificado', 'rechazado', 'enviado'].forEach(function(e){
      sb.from('store_orders').select('id', { count: 'exact', head: true }).eq('estado', e).then(function(r){
        conteos[e] = r.count || 0;
        pend--;
        if (pend === 0) { conteos.todos = conteos.pendiente + conteos.verificado + conteos.rechazado + conteos.enviado; pintarFiltros(); }
      }, function(){ pend--; });
    });
  }
  function cargar(){
    pintarFiltros();
    var qy = sb.from('store_orders').select('*, store_order_items(*)').order('created_at', { ascending: false }).limit(100);
    if (pedFiltro !== 'todos') qy = qy.eq('estado', pedFiltro);
    qy.then(function(r){
      var cont = q('#listaPed');
      if (!cont) return;
      var os = r.data || [];
      if (r.error) { cont.innerHTML = '<div class="hud-vacio">Error cargando pedidos.</div>'; return; }
      if (!os.length) { cont.innerHTML = '<div class="hud-vacio">Sin pedidos en este filtro.</div>'; return; }
      cont.innerHTML = os.map(function(o, i){
        return '<div class="hud-fila" style="align-items:flex-start"><div class="grow">' +
          '<div class="tt">#' + _esc(o.numero) + ' \u00b7 ' + _esc(o.nombre) + ' ' + _esc(o.apellido) + '</div>' +
          '<div class="st">' + _esc(new Date(o.created_at).toLocaleString('es-VE')) + ' \u00b7 Total: ' + _esc(fmtMonto(o.total)) + (Number(o.descuento) > 0 ? ' (desc. ' + _esc(fmtMonto(o.descuento)) + ')' : '') + '</div></div>' +
          '<span class="pill ' + _esc(o.estado) + '">' + _esc(o.estado) + '</span>' +
          '<button class="hud-btn sec mini" data-pver="' + i + '">Ver</button>' +
          '<div class="ped-detalle" id="pedDet' + i + '" style="display:none"></div>' +
        '</div>';
      }).join('');
      qa('[data-pver]', cont).forEach(function(b){
        b.addEventListener('click', function(){
          var i = Number(b.getAttribute('data-pver'));
          var det = q('#pedDet' + i);
          if (det.style.display !== 'none') { det.style.display = 'none'; return; }
          det.style.display = 'block';
          pintarDetalle(os[i], det);
        });
      });
    }, function(){ toast('Error de conexion'); });
  }
  function pintarDetalle(o, det){
    var items = (o.store_order_items || []).map(function(it){
      var v = [];
      if (it.talla) v.push('talla ' + _esc(it.talla));
      if (it.color) v.push(_esc(it.color));
      return 'X' + it.qty + ' ' + _esc(it.product_nombre) + (v.length ? ' (' + v.join(', ') + ')' : '') + ' \u00b7 ' + _esc(fmtMonto(it.precio_unit)) + ' c/u \u00b7 subtotal ' + _esc(fmtMonto(it.subtotal));
    }).join('<br>');
    var celNum = String(o.celular || '').replace(/[^0-9]/g, '');
    det.innerHTML = '' +
      '<h4>Items</h4>' + (items || 'Sin items') +
      '<h4>Totales</h4>Subtotal: ' + _esc(fmtMonto(o.subtotal)) +
      (Number(o.descuento) > 0 ? '<br>Codigo: ' + _esc(o.codigo_descuento || '') + ' \u00b7 Descuento: -' + _esc(fmtMonto(o.descuento)) : '') +
      '<br><strong>Total: ' + _esc(fmtMonto(o.total)) + '</strong>' +
      '<h4>Datos de envio</h4>' +
      _esc(o.nombre) + ' ' + _esc(o.apellido) + '<br>' +
      _esc(o.doc_tipo) + '-' + _esc(o.doc_numero) + '<br>' +
      '+58 ' + _esc(o.celular) + ' <a href="https://wa.me/58' + celNum + '" target="_blank" rel="noopener" style="color:#8ab4f8">abrir WhatsApp</a><br>' +
      'Agencia: ' + _esc(o.direccion_agencia) + '<br>Solo MRW y Zoom.' +
      (o.guia ? '<br>Guia: ' + _esc(o.guia) : '') +
      (o.motivo_rechazo ? '<br>Motivo de rechazo: ' + _esc(o.motivo_rechazo) : '') +
      '<h4>Comprobante de pago</h4><div id="compZona">' + (o.comprobante_path ? 'Cargando comprobante...' : 'Sin comprobante \u2014 cliente indic\u00f3 pago por Whatsapp') + '</div>' +
      '<h4>Notas internas</h4><textarea class="hud-txt" id="pedNotas">' + _esc(o.notas_admin || '') + '</textarea>' +
      '<button class="hud-btn sec mini" id="pedNotasGuardar" style="margin-top:8px">Guardar notas</button>' +
      '<div class="ped-acciones" id="pedAcc"></div>';

    if (o.comprobante_path) {
      sb.storage.from('store-receipts').createSignedUrl(o.comprobante_path, 3600).then(function(r){
        var z = q('#compZona', det);
        if (!z) return;
        if (r.error || !r.data) { z.textContent = 'No se pudo cargar el comprobante'; return; }
        var url = r.data.signedUrl;
        if (/\.pdf($|\?)/i.test(o.comprobante_path)) z.innerHTML = '<a href="' + _esc(url) + '" target="_blank" rel="noopener" style="color:#8ab4f8">Abrir comprobante PDF</a>';
        else z.innerHTML = '<img class="comp-img" src="' + _esc(url) + '" alt="Comprobante">';
      }, function(){});
    }
    q('#pedNotasGuardar', det).addEventListener('click', function(){
      sb.from('store_orders').update({ notas_admin: q('#pedNotas', det).value }).eq('id', o.id).then(function(r){
        toast(r.error ? 'Error guardando notas' : 'Notas guardadas');
      }, function(){ toast('Error de conexion'); });
    });

    var acc = q('#pedAcc', det);
    if (o.estado === 'pendiente') {
      acc.innerHTML = '<button class="hud-btn" id="accVerif">Verificar pago</button><button class="hud-btn peligro" id="accRech">Rechazar</button>';
      q('#accVerif', det).addEventListener('click', function(){ verificarPedido(o, q('#accVerif', det)); });
      q('#accRech', det).addEventListener('click', function(){
        var motivo = window.prompt('Motivo del rechazo (opcional):') || null;
        sb.from('store_orders').update({ estado: 'rechazado', motivo_rechazo: motivo }).eq('id', o.id).then(function(r){
          if (r.error) { toast('Error'); return; }
          toast('Pedido rechazado');
          contar(); cargar();
        }, function(){ toast('Error de conexion'); });
      });
    } else if (o.estado === 'verificado') {
      acc.innerHTML = '<button class="hud-btn" id="accEnv">Marcar enviado</button>';
      q('#accEnv', det).addEventListener('click', function(){
        var guia = window.prompt('Numero de guia MRW/Zoom (opcional):') || null;
        sb.from('store_orders').update({ estado: 'enviado', guia: guia, enviado_at: new Date().toISOString() }).eq('id', o.id).then(function(r){
          if (r.error) { toast('Error'); return; }
          toast('Pedido marcado como enviado');
          contar(); cargar();
        }, function(){ toast('Error de conexion'); });
      });
    }
  }
  function verificarPedido(o, btn){
    btn.disabled = true;
    btn.textContent = 'Verificando...';
    var items = o.store_order_items || [];
    var idx = 0;
    function siguiente(){
      if (idx >= items.length) {
        sb.from('store_orders').update({ estado: 'verificado', verificado_at: new Date().toISOString() }).eq('id', o.id).then(function(r){
          if (r.error) { toast('Stock descontado pero fallo el cambio de estado'); return; }
          toast('Pago verificado y stock descontado');
          recargarCatalogo();
          contar(); cargar();
        }, function(){ toast('Error de conexion'); });
        return;
      }
      var it = items[idx];
      sb.rpc('store_decrement_stock', { variant: it.variant_id, cantidad: it.qty }).then(function(r){
        if (r.error) {
          btn.disabled = false;
          btn.textContent = 'Verificar pago';
          toast('Stock insuficiente en: ' + it.product_nombre + '. Resuelve el inventario antes de verificar.');
          return;
        }
        idx++;
        siguiente();
      }, function(){
        btn.disabled = false;
        btn.textContent = 'Verificar pago';
        toast('Error de conexion descontando stock');
      });
    }
    siguiente();
  }
  contar();
  cargar();
}

/* ---- Configuracion ---- */
function adminConfig(main){
  var c = estado.config || {};
  main.innerHTML = '<h2>Configuracion</h2><div class="hud-card">' +
    '<label class="hud-lbl" for="cfBinance">Binance ID</label><input class="hud-inp" id="cfBinance" value="' + _esc(c.binance_id || '') + '">' +
    '<label class="hud-lbl" for="cfWa">WhatsApp (con codigo de pais, solo numeros)</label><input class="hud-inp" id="cfWa" value="' + _esc(c.whatsapp || '') + '">' +
    '<label class="hud-lbl" for="cfEmail">Email de contacto</label><input class="hud-inp" id="cfEmail" value="' + _esc(c.email || '') + '">' +
    '<label class="hud-lbl" for="cfHero">Imagen hero home (path del bucket o URL)</label><div style="display:flex;gap:8px"><input class="hud-inp" id="cfHero" value="' + _esc(c.img_hero || '') + '"><input type="file" accept="image/*" data-cfimg="cfHero" class="hud-inp" style="max-width:130px"></div>' +
    '<label class="hud-lbl" for="cfCheckout">Imagen checkout</label><div style="display:flex;gap:8px"><input class="hud-inp" id="cfCheckout" value="' + _esc(c.img_checkout || '') + '"><input type="file" accept="image/*" data-cfimg="cfCheckout" class="hud-inp" style="max-width:130px"></div>' +
    '<label class="hud-lbl" for="cfGracias">Imagen gracias</label><div style="display:flex;gap:8px"><input class="hud-inp" id="cfGracias" value="' + _esc(c.img_gracias || '') + '"><input type="file" accept="image/*" data-cfimg="cfGracias" class="hud-inp" style="max-width:130px"></div>' +
    '<div class="ped-acciones"><button class="hud-btn" id="cfGuardar">Guardar configuracion</button>' +
    '<button class="hud-btn peligro" id="cfSalir">Cerrar sesion</button></div></div>';

  qa('[data-cfimg]', main).forEach(function(inp){
    inp.addEventListener('change', function(){
      var f = inp.files && inp.files[0];
      if (!f) return;
      var path = 'editorial/' + Date.now() + '_' + Math.random().toString(36).slice(2, 8) + '.' + (f.name.split('.').pop().toLowerCase() || 'jpg');
      sb.storage.from('store-products').upload(path, f, { contentType: f.type }).then(function(r){
        if (r.error) { toast('Error subiendo imagen'); return; }
        q('#' + inp.getAttribute('data-cfimg'), main).value = path;
        toast('Imagen subida: guarda la configuracion');
      }, function(){ toast('Error de conexion'); });
    });
  });
  q('#cfGuardar', main).addEventListener('click', function(){
    var datos = {
      binance_id: q('#cfBinance', main).value.trim(),
      whatsapp: q('#cfWa', main).value.trim().replace(/[^0-9]/g, ''),
      email: q('#cfEmail', main).value.trim(),
      img_hero: q('#cfHero', main).value.trim(),
      img_checkout: q('#cfCheckout', main).value.trim(),
      img_gracias: q('#cfGracias', main).value.trim()
    };
    var op = (estado.config && estado.config.id)
      ? sb.from('store_config').update(datos).eq('id', estado.config.id).select('*').single()
      : sb.from('store_config').insert(datos).select('*').single();
    op.then(function(r){
      if (r.error) { toast('Error guardando configuracion'); return; }
      estado.config = r.data;
      toast('Configuracion guardada');
    }, function(){ toast('Error de conexion'); });
  });
  q('#cfSalir', main).addEventListener('click', function(){
    sb.auth.signOut().then(function(){
      toast('Sesion cerrada');
      location.hash = '#/';
    }, function(){ toast('Error cerrando sesion'); });
  });
}

/* ================= BOOT ================= */
function boot(){
  wireLogin();
  requestAnimationFrame(splashLoop);
  var timeoutSplash = setTimeout(splashCerrar, 3500);
  cargarBase(function(){
    var c = estado.config || {};
    function arrancar(){
      clearTimeout(timeoutSplash);
      navegar();
      requestAnimationFrame(function(){ splashCerrar(); });
    }
    if (c.img_hero && (location.hash === '' || location.hash === '#/' || location.hash === '#')) {
      var im = new Image();
      im.src = pubUrl(c.img_hero);
      var decodeP = im.decode ? im.decode() : Promise.resolve();
      decodeP.then(function(){ splashAvanza(25); arrancar(); }, function(){ splashAvanza(25); arrancar(); });
    } else {
      splashAvanza(25);
      arrancar();
    }
  });
}
boot();
</script>
