name: Close Expired Auctions
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:
jobs:
  close:
    runs-on: ubuntu-latest
    steps:
      - name: Call auction-close endpoint
        run: |
          curl -X POST https://ruedda-frontend.vercel.app/api/auction-close \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -f --silent --show-error
